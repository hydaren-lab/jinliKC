

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진리 중국어 온라인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#F5F3EE;
            --c1:#E84855;--c2:#3A86FF;--c3:#2EC4B6;
            --c4:#FF9F1C;--c5:#8338EC;--c6:#06A77D;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;padding:24px 20px 60px;}

        header{
            max-width:820px;margin:0 auto 28px;
            background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            border-radius:20px;padding:32px 36px;color:#fff;
            position:relative;overflow:hidden;
            box-shadow:0 12px 40px rgba(26,26,46,0.25);
        }
        header::before{
            content:'';position:absolute;top:-40px;right:-40px;
            width:200px;height:200px;border-radius:50%;
            background:radial-gradient(circle,rgba(232,72,85,0.35) 0%,transparent 70%);
        }
        .badge{
            display:inline-block;background:rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.25);color:#FFE082;
            font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:700;
            letter-spacing:0.12em;text-transform:uppercase;
            padding:4px 12px;border-radius:20px;margin-bottom:14px;
        }
        header h1{font-family:'DM Sans',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:6px;position:relative;z-index:1;}
        header p{font-size:0.84rem;color:rgba(255,255,255,0.6);position:relative;z-index:1;}

        .ep-list{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}

        .ep-card{
            background:#fff;border-radius:16px;
            padding:20px 24px 20px 28px;
            border-left:6px solid var(--accent);
            box-shadow:0 4px 20px rgba(0,0,0,0.07);
            cursor:pointer;text-decoration:none;display:block;
            transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
            position:relative;
            opacity:0;animation:fadeUp 0.4s ease forwards;
        }
        .ep-card:hover{transform:translateX(6px);box-shadow:0 8px 32px rgba(0,0,0,0.13);}
        .ep-card::after{
            content:'›';position:absolute;right:22px;top:50%;
            transform:translateY(-50%);font-size:1.6rem;
            color:var(--accent);opacity:0.3;transition:opacity 0.2s;
        }
        .ep-card:hover::after{opacity:0.8;}

        .ep-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
        .ep-num{
            font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:700;
            letter-spacing:0.1em;color:var(--accent);
            background:color-mix(in srgb,var(--accent) 12%,transparent);
            padding:3px 10px;border-radius:20px;
        }
        .ep-tag{font-size:0.72rem;font-weight:700;color:#999;background:#f0ede7;padding:3px 10px;border-radius:20px;}
        .ep-count{font-size:0.72rem;color:#bbb;margin-left:auto;padding-right:28px;}
        .ep-title-ko{font-size:1.03rem;font-weight:700;color:#1a1a2e;line-height:1.5;margin-bottom:4px;}
        .ep-title-zh{font-size:0.86rem;color:#aaa;line-height:1.5;}

        .c1{--accent:var(--c1)}.c2{--accent:var(--c2)}.c3{--accent:var(--c3)}
        .c4{--accent:var(--c4)}.c5{--accent:var(--c5)}.c6{--accent:var(--c6)}

        @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

        .footer{max-width:820px;margin:32px auto 0;padding:16px 20px;
            text-align:right;border-top:2px solid rgba(0,0,0,0.08);
            font-weight:700;color:#aaa;font-size:0.88rem;}

        @media(max-width:600px){
            header{padding:22px 20px;}header h1{font-size:1.2rem;}
            .ep-card{padding:16px 18px 16px 22px;}
        }
    </style>
</head>
<body>
<header>
    <div class="badge">🎓 진리 중국어 온라인</div>
    <h1>에피소드 목록</h1>
    <p>학습할 에피소드를 선택하세요. 문장 클릭 → 중국어 음성 / 다시 클릭 → 한국어 음성</p>
</header>

<div class="ep-list" id="ep-list"></div>
<div class="footer">ⓒ 진리 중국어 온라인</div>

<script>
// ════════════════════════════════════════════════════════
// 새 에피소드 추가 시 여기만 수정
// { id, num, tag, titleKo, titleZh, count, color }
// color: c1(빨강) c2(파랑) c3(청록) c4(주황) c5(보라) c6(초록)
// ════════════════════════════════════════════════════════
const episodes = [
    { id:"ep01", num:"EP.01", tag:"사설", color:"c2",
      titleKo:"한자 교육의 복원, 문해력 위기를 넘어서는 언어의 기초",
      titleZh:"汉字教育的回归：超越读写素养危机的语言根基", count:33 },

    { id:"ep02", num:"EP.02", tag:"사설", color:"c1",
      titleKo:"한자 병기 논쟁, 문해력의 본질을 흐리고 있다",
      titleZh:"汉字加注之争，正在模糊读写素养的本质", count:9 },

    { id:"ep03", num:"EP.03", tag:"사설", color:"c3",
      titleKo:"역사는 밈이 아니다 — 기업, 사회, 그리고 우리가 해야 할 일",
      titleZh:"历史不是梗——企业、社会与我们各自应尽的责任", count:41 },

    { id:"ep04", num:"EP.04", tag:"사설", color:"c4",
      titleKo:"‘가짜뉴스’라는 말이 가짜가 될 때",
      titleZh:"当“假新闻”一词变得虚假时", count:53 },

    { id:"ep05", num:"EP.05", tag:"사설", color:"c5",
      titleKo:"올바른 방안: 제도, 교육, 그리고 연대",
      titleZh:"正确方案：制度、教育及团结", count:30 }
];

const list = document.getElementById('ep-list');
const colors = ['c1','c2','c3','c4','c5','c6'];

episodes.forEach((ep, i) => {
    const a = document.createElement('a');
    a.className = `ep-card ${ep.color || colors[i % 6]}`;
    a.href = `player.html?ep=${ep.id}`;
    a.style.animationDelay = (i * 0.07) + 's';
    a.innerHTML = `
        <div class="ep-meta">
            <span class="ep-num">${ep.num}</span>
            <span class="ep-tag">${ep.tag}</span>
            <span class="ep-count">문장 ${ep.count}개</span>
        </div>
        <div class="ep-title-ko">${ep.titleKo}</div>
        <div class="ep-title-zh">${ep.titleZh}</div>`;
    list.appendChild(a);
});
</script>
</body>
</html>
