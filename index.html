<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>진리 중국어</title>
</head>
<body>
  <h1>Loading...</h1>

  <script>
    fetch('https://jinlikc.pages.dev/list.json')
      .then(res => res.json())
      .then(data => {
        document.body.innerHTML = data.episodes
          .map(ep => `<div>${ep.id}</div>`)
          .join('');
      });
  </script>
</body>
</html>
